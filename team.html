<!DOCTYPE html>
<html lang="en">
<!-- Team page for Girlsin.tech - Simplified and fixed version -->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team - Girlsin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --beige:#F5F5DC;
      --green:#A3D9A5;
      --text:#000;
      --outline:#000;
      --radius:14px;
    }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; font-family: 'Inter', Arial, sans-serif; color:var(--text); background:var(--green); }
    body { display:flex; flex-direction:column; cursor: auto; }
    a { color:inherit; }
    
    /* Custom cursor removed */
    
    /* Simple header */
    .header { background:var(--beige); border-bottom:3px solid var(--outline); display:flex; align-items:center; justify-content:space-between; padding:12px 24px; position:relative; }
    .page-title { font-weight:600; font-size:20px; text-align: center; flex: 1; }
    .icon-btn { width:36px; height:36px; border:2px solid var(--outline); background:#fff; display:flex; align-items:center; justify-content:center; border-radius:10px; cursor:pointer; box-shadow:2px 2px 0 #000; }
    .icon-btn:active { transform:translate(1px,1px); box-shadow:1px 1px 0 #000; }
    svg { width:18px; height:18px; stroke:var(--text); }
    
    /* Main content */
    .main-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .team-header { text-align: center; margin-bottom: 40px; }
    .team-header h1 { margin: 0 0 10px; font-size: 32px; }
    .team-header p { margin: 0; font-size: 16px; opacity: 0.8; }
    
    /* Team member cards */
    .team-grid { display:grid; gap:26px; grid-template-columns:repeat(2,minmax(260px,1fr)); max-width: 800px; margin: 0 auto; justify-content: center; }
    .team-card { 
      background:#fff; 
      border:3px solid #000; 
      padding:20px; 
      position:relative; 
      border-radius:18px; 
      box-shadow:4px 4px 0 #000; 
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }
    .team-card:hover { 
      transform:translate(-3px,-3px); 
      box-shadow:7px 7px 0 #000; 
      background-color: #fafafa;
    }
    .team-card:active { 
      transform:translate(-1px,-1px); 
      box-shadow:5px 5px 0 #000; 
    }
    .team-card img { 
      width:120px; 
      height:120px; 
      border-radius:50%; 
      object-fit:cover; 
      border:2px solid #000; 
      margin-bottom:16px; 
      transition: transform 0.3s ease;
    }
    .team-card:hover img { 
      transform: scale(1.05);
    }
    .team-card h3 { 
      margin:0 0 4px; 
      font-size:18px; 
      text-align:center; 
    }
    .team-card .role { 
      margin:0 0 12px; 
      font-size:14px; 
      color:#555; 
      font-weight:500; 
      text-align:center; 
      background-color: var(--beige);
      border-radius: 12px;
      padding: 3px 10px;
      display: inline-block;
    }
    .team-card p { 
      margin:0; 
      font-size:14px; 
      line-height:1.5; 
      text-align:center; 
    }
    
    @media (max-width:980px){ .team-grid { grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); } }
    @media (max-width:600px){ 
      .team-grid { grid-template-columns: 1fr; } 
      .team-header h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <button class="icon-btn" title="Back" id="goBackBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
        <line x1="9" y1="12" x2="21" y2="12"/>
      </svg>
    </button>
    <div class="page-title">Our Team</div>
    <div style="width:36px"></div><!-- Spacer for alignment -->
  </header>
  
  <!-- Main Content -->
  <div class="main-container">
    <div class="team-header">
      <h1>Meet Our Team</h1>
      <p>The amazing people who make Girlsin.tech possible</p>
    </div>
    
    <div class="team-grid" id="teamGrid"></div>
  </div>

  <script>
    // Team members dataset
    const teamMembers = [
      {
        id: 1,
        name: "Asneem",
        role: "Full-Stack Developer & Co-Founder",
        bio: "Passionate about creating inclusive tech spaces for women. Specializes in building scalable web applications and mentoring aspiring developers. Loves solving complex problems with elegant code.",
        image: "assets/an.png",
        link: "profile.html"
      },
      {
        id: 2,
        name: "Keerthi",
        role: "Frontend Developer & Co-Founder",
        bio: "Dedicated to crafting beautiful, user-friendly interfaces that empower women in tech. Expert in modern frameworks and design systems. Believes in the power of community-driven learning.",
        image: "assets/kee.png"
      }
    ];

    const grid = document.getElementById('teamGrid');
    teamMembers.forEach(member => {
      const el = document.createElement('div');
      el.className = 'team-card';
      if (member.link) {
        el.onclick = () => {
          setTimeout(() => {
            window.location.href = member.link;
          }, 100); // Give time for click sound to play
        };
      }
      el.innerHTML = 
        '<img src="' + member.image + '" alt="' + member.name + '">' +
        '<h3>' + member.name + '</h3>' +
        '<div class="role">' + member.role + '</div>' +
        '<p>' + member.bio + '</p>';
      grid.appendChild(el);
    });

    // Back button logic
    const goBackBtn = document.getElementById('goBackBtn');
    if(goBackBtn) {
      goBackBtn.addEventListener('click', () => {
        playClickSound();
        if(document.referrer && document.referrer !== location.href) {
          history.back();
        } else {
          window.location.href = 'landingpage.html';
        }
      });
    }
    
    // Audio element for click sound (preloaded but hidden)
    const audioElement = document.createElement('audio');
    audioElement.id = 'click-sound';
    audioElement.preload = 'auto';
    audioElement.style.display = 'none';
    
    const sourceElement = document.createElement('source');
    sourceElement.src = 'assets/click.mp3';
    sourceElement.type = 'audio/mp3';
    
    audioElement.appendChild(sourceElement);
    document.body.appendChild(audioElement);
    
    // Function to play click sound
    function playClickSound() {
      const clickSound = document.getElementById('click-sound');
      if (clickSound) {
        try {
          clickSound.currentTime = 0;
          const playPromise = clickSound.play();
          if (playPromise !== undefined) {
            playPromise.catch(function(error) {
              console.log('Audio playback error:', error);
            });
          }
        } catch (e) {
          console.log('Audio play error:', e);
        }
      }
    }
    
    // Add click sound to team cards
    document.querySelectorAll('.team-card').forEach(card => {
      card.addEventListener('click', playClickSound);
    });
    
    // Custom cursor removed; native pointer restored
  </script>
</body>
</html>
