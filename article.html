<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articles - Girlsin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --beige:#F5F5DC;
      --green:#A3D9A5;
      --text:#000;
      --outline:#000;
      --radius:14px;
    }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; font-family: 'Inter', Arial, sans-serif; color:var(--text); background:var(--green); }
    body { display:flex; flex-direction:column; }
    a { color:inherit; }
    /* Layout shell */
    .app-shell { flex:1; display:grid; grid-template-columns:250px 1fr; grid-template-rows:auto 1fr; grid-template-areas: "sidebar header" "sidebar main"; height:100%; }
    .sidebar { grid-area:sidebar; background:var(--beige); border-right:3px solid var(--outline); padding:14px 14px 80px; display:flex; flex-direction:column; gap:22px; position:relative; }
    .header { grid-area:header; background:var(--beige); border-bottom:3px solid var(--outline); display:flex; align-items:center; justify-content:space-between; padding:8px 18px; position:relative; }
    .main { grid-area:main; position:relative; overflow:hidden; }
    /* Header */
    .hdr-left,.hdr-right { display:flex; gap:14px; align-items:center; }
    .hdr-center { position:absolute; left:50%; transform:translateX(-50%); font-weight:600; font-size:18px; }
    .icon-btn { width:32px; height:32px; border:2px solid var(--outline); background:#fff; display:flex; align-items:center; justify-content:center; border-radius:10px; cursor:pointer; box-shadow:2px 2px 0 #000; }
    .icon-btn:active { transform:translate(1px,1px); box-shadow:1px 1px 0 #000; }
    svg { width:18px; height:18px; stroke:var(--text); }
    /* Sidebar sections */
    .team-row { display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-weight:600; }
    .team-row span { display:flex; align-items:center; gap:6px; }
    .caret { transition:transform .25s; }
    .collapsed .caret { transform:rotate(-90deg); }
    .section-title { font-size:13px; text-transform:uppercase; letter-spacing:.5px; margin:4px 0 6px; font-weight:600; }
    .channels { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:6px; }
    .channels li { padding:6px 10px; border:2px solid transparent; border-radius:10px; cursor:pointer; display:flex; align-items:center; gap:6px; font-size:14px; }
    .channels li:hover { background:#ffffffa8; }
    .channels li.active { background:#fff; border-color:#000; font-weight:600; position:relative; }
    .badge { background:#000; color:#fff; font-size:11px; min-width:18px; text-align:center; padding:2px 5px; border-radius:12px; margin-left:auto; }
    .dm, .threads-label { font-size:14px; padding:4px 6px; }
    hr.sep { border:none; border-top:2px solid #000; margin:4px 0 2px; }
    /* Main content */
    .channel-header { display:flex; align-items:center; justify-content:space-between; padding:10px 22px 6px; background:var(--beige); border-bottom:3px solid var(--outline); font-size:14px; }
    .channel-header h2 { margin:0; font-size:16px; }
    .content-scroll { position:absolute; inset:56px 0 0 0; overflow:auto; padding:24px clamp(16px,3vw,40px) 120px; }
    /* Article cards inside channel */
    .articles-grid { display:grid; gap:26px; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); }
    .article-card { background:#fff; border:3px solid #000; padding:14px 16px 60px; position:relative; border-radius:18px; min-height:200px; box-shadow:4px 4px 0 #000; cursor:pointer; display:flex; flex-direction:column; justify-content:flex-start; }
    .article-card:hover { transform:translate(-3px,-3px); box-shadow:8px 8px 0 #000; }
    .article-card:active { transform:translate(0,0); box-shadow:4px 4px 0 #000; }
    .article-card h3 { margin:0 0 8px; font-size:18px; }
    .article-card p { margin:0; font-size:13px; line-height:1.4; flex:1; }
    .read-btn { position:absolute; right:12px; bottom:12px; border:2px solid #000; background:var(--green); padding:6px 14px; font-size:13px; font-weight:600; border-radius:10px; cursor:pointer; box-shadow:2px 2px 0 #000; }
    .read-btn:hover { background:#8cca8d; }
    .read-btn:active { transform:translate(1px,1px); box-shadow:1px 1px 0 #000; }
    /* Dock */
    .dock { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); background:rgba(255,255,255,0.7); backdrop-filter:blur(6px); border:3px solid #000; border-radius:30px; display:flex; gap:18px; padding:14px 28px; box-shadow:6px 6px 0 #000; z-index:600; }
    .dock-item { width:60px; text-align:center; font-size:11px; font-weight:600; cursor:pointer; position:relative; }
    .dock-item img, .dock-item .dock-icon { width:54px; height:54px; border:3px solid #000; background:#fff; border-radius:18px; display:flex; align-items:center; justify-content:center; box-shadow:3px 3px 0 #000; }
    .dock-item span { display:block; margin-top:6px; }
    .dock-item:hover img, .dock-item:hover .dock-icon { transform:translateY(-6px); }
    .dock-icon svg { width:32px; height:32px; stroke-width:2.2; }
    /* Scrollbar simple */
    .content-scroll::-webkit-scrollbar { width:14px; }
    .content-scroll::-webkit-scrollbar-track { background:var(--beige); }
    .content-scroll::-webkit-scrollbar-thumb { background:#222; border:3px solid var(--beige); border-radius:20px; }
    @media (max-width:980px){ .app-shell { grid-template-columns:210px 1fr; } .articles-grid { grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); } }
    @media (max-width:720px){ .app-shell { grid-template-columns:64px 1fr; } .sidebar { padding:10px 8px 70px; } .channels li { padding:6px 6px; font-size:12px; } .dock { scale:.85; } }
  </style>
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="team-block">
        <div class="team-row" id="teamToggle">
          <span><svg class="caret" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg> MyTeam</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/></svg>
        </div>
        <hr class="sep"/>
        <div id="teamSection">
          <div class="threads-label">Threads</div>
          <div class="section-title">Channels</div>
          <ul class="channels" id="channelList">
            <li># general</li>
            <li># office</li>
            <li class="active" data-channel="nat-geo"># nat-geo <span class="badge">4</span></li>
            <li># front-end</li>
            <li># design</li>
            <li># coca-cola</li>
          </ul>
          <div class="section-title" style="margin-top:14px;">Direct Messages</div>
          <div class="dm">(none yet)</div>
        </div>
      </div>
    </nav>
    <!-- Header -->
    <header class="header">
      <div class="hdr-left">
        <button class="icon-btn" title="Back" id="goBackBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/><line x1="9" y1="12" x2="21" y2="12"/></svg></button>
        <button class="icon-btn" title="Search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
        <button class="icon-btn" title="Add"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <button class="icon-btn" title="User"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c1.5-4 6.5-4 8-4s6.5 0 8 4"/></svg></button>
        <button class="icon-btn" title="Mail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="3"/><polyline points="3 7 12 13 21 7"/></svg></button>
      </div>
      <div class="hdr-center">Articles</div>
      <div class="hdr-right">
        <div style="font-size:14px; font-weight:500;"># nat-geo | Members: <strong>8</strong></div>
        <button class="icon-btn" title="Members"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></button>
        <button class="icon-btn" title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 8 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H2a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 3.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 8 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09c0 .7.4 1.34 1 1.51a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06c-.46.46-.58 1.12-.33 1.82.17.6.8 1 1.51 1H22a2 2 0 1 1 0 4h-.09c-.7 0-1.34.4-1.51 1Z"/></svg></button>
      </div>
    </header>
    <!-- Main -->
    <section class="main">
      <div class="channel-header"><h2># nat-geo Articles</h2><div style="font-size:12px; opacity:.7;">Showing latest posts</div></div>
      <div class="content-scroll" id="contentScroll">
        <div class="articles-grid" id="articlesGrid"></div>
      </div>
    </section>
  </div>
  <!-- Dock -->
  <div class="dock" id="dock">
    <div class="dock-item" title="Finder">
      <div class="dock-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6l-1 6h-4L9 3Z"/><path d="M4 21h16l-2-12H6L4 21Z"/></svg></div>
      <span>Finder</span>
    </div>
    <div class="dock-item" title="Safari">
      <div class="dock-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 8l-5 5"/><path d="m14 14 2-6-6 2-2 6 6-2Z"/></svg></div>
      <span>Safari</span>
    </div>
    <div class="dock-item" title="Docs">
      <img src="assets/folder.png" alt="docs">
      <span>docs</span>
    </div>
    <div class="dock-item" title="Docs">
      <img src="assets/folder.png" alt="docs">
      <span>docs</span>
    </div>
  </div>
  <script>
    // Collapse team section
    const teamToggle = document.getElementById('teamToggle');
    const teamSection = document.getElementById('teamSection');
    teamToggle.addEventListener('click',()=>{
      teamSection.classList.toggle('collapsed');
      teamToggle.parentElement.classList.toggle('collapsed');
      if(teamSection.style.display==='none'){ teamSection.style.display=''; } else { teamSection.style.display='none'; }
    });

    // Article dataset
    const articles = [
      {id:1,title:'Desert Dunes Discovery',snippet:'Exploring wind-shaped forms and hidden ecosystems across arid landscapes.',body:`Long-form Article 1\n\nLorem ipsum dolor sit amet, consectetur adipiscing elit. Sed pharetra libero ut sapien luctus, a tempus arcu porta. Vivamus luctus, elit sit amet facilisis viverra, neque lacus volutpat lacus, vitae rhoncus turpis dui non augue.\n\nSubsection\nSuspendisse potenti. Integer ut ligula eget sapien fringilla vulputate. Cras efficitur vulputate purus, nec hendrerit nibh fringilla in. Cras ullamcorper dui a orci porttitor, vitae hendrerit metus pulvinar.`},
      {id:2,title:'Rainforest Canopy Life',snippet:'A micro‑world above the forest floor filled with color and sound.',body:`Article 2 Body\n\nCurabitur porta lacinia nisl, sed sagittis neque volutpat id. Integer bibendum nulla vitae luctus. Etiam varius condimentum lacus. Praesent maximus consequat leo nec tempor.`},
      {id:3,title:'Volcanic Rock Patterns',snippet:'Textures and mineral mosaics around recent lava fields.',body:`Article 3 Body\n\nPellentesque habitant morbi tristique senectus et netus. Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere cubilia curae; Quisque euismod mauris ut purus tincidunt.`},
      {id:4,title:'Arctic Ice Migrations',snippet:'Tracking seasonal shifts and wildlife navigation strategies.',body:`Article 4 Body\n\nSuspendisse potenti. Cras dapibus aliquet eros, quis facilisis erat aliquet in. Donec porta velit non libero tincidunt.`},
      {id:5,title:'Coral Reef Night Glow',snippet:'Bioluminescence and nocturnal reef activity under the lens.',body:`Article 5 Body\n\nUt tristique laoreet diam, sed efficitur sem. Duis a luctus ligula. Sed vitae ex porttitor, pretium mi in, finibus nisl.`},
      {id:6,title:'Savanna Storm Fronts',snippet:'Rapid weather changes and their ecological impacts.',body:`Article 6 Body\n\nAliquam erat volutpat. Nunc sagittis eros id sapien gravida, id rhoncus ipsum porta.`}
    ];

    const grid = document.getElementById('articlesGrid');
    articles.forEach(a=>{
      const el=document.createElement('div');
      el.className='article-card';
      el.innerHTML=`<h3>${a.title}</h3><p>${a.snippet}</p><button class='read-btn' data-id='${a.id}'>Read</button>`;
      grid.appendChild(el);
    });
    // Back button logic
    const goBackBtn=document.getElementById('goBackBtn');
    if(goBackBtn){
      goBackBtn.addEventListener('click',()=>{
        if(document.referrer && document.referrer!==location.href){
          history.back();
        } else {
          window.location.href='landingpage.html';
        }
      });
    }
  </script>
</body>
</html>
