<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girlsin</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: auto;
            /* Default cursor using arrow.png */
            cursor: url('assets/arrow.png') 0 0, auto;
        }
        /* While clicking (class toggled via JS) */
        html.cursor-clicking, body.cursor-clicking {
            cursor: url('assets/arrow.png') 0 0, pointer;
        }
        body {
            background-color: #ffe7d8;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .bg-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        /* Responsive adjustments to keep clickable areas aligned */
        @media screen and (max-width: 1200px) {
            .photo-link {
                left: 79%;
                top: 31%;
            }
        }
        
        @media screen and (max-width: 768px) {
            .photo-link {
                left: 78%;
                top: 32%;
            }
            
            .book-link {
                left: 47%;
                top: 76%;
            }
        }
        .container {
            padding: 20px;
            z-index: 1;
        }
    </style>
    <style>
        /* Common hover effect styles for all clickable elements */
        .clickable {
            cursor: url('assets/arrow.png') 0 0, pointer !important;
            transition: transform 0.2s ease; /* Adding back a quick transition for smooth raising */
        }
        .clickable:hover {
            transform: scale(1.1) translateY(-5px); /* Added translateY to create "raise up" effect */
        }
        
        /* Uncomment this line to see all clickable areas for debugging
        .clickable { outline: 1px solid red; } */
        
        /* PC styles - simplified to work better with parent link */
        .overlay-pc {
            cursor: pointer !important;
            transition: transform 0.2s ease;
        }
        
        /* Apply hover effect directly to the image */
        .overlay-pc:hover {
            transform: scale(1.05) translateY(-8px); /* Added translateY to create "raise up" effect */
        }
        
        #pc-link {
            transition: transform 0.2s ease;
            z-index: 20;
        }
        /* No additional hover effects for PC image */
        
        /* Author image styles */
        .overlay-author {
            cursor: pointer !important;
            transition: transform 0.2s ease;
        }
        
        .overlay-author:hover {
            transform: scale(1.1) translateY(-6px); /* Added translateY to create "raise up" effect */
        }
        
        #author-link {
            transition: transform 0.2s ease;
            z-index: 20;
        }
        
        /* Team image styles - blended with background */
        .overlay-team {
            cursor: pointer !important;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        
        .overlay-team:hover {
            transform: scale(1.03) translateY(-4px); /* Added translateY to create "raise up" effect */
            opacity: 1;
        }
        
        #team-link {
            opacity: 0.98;
            transition: opacity 0.2s ease;
            z-index: 20;
        }
        #team-link:hover {
            opacity: 1;
        }
        
        /* Plants image styles - no hover effects or animation */
        
        /* Capybara image styles - no hover effects */
        
        .overlay-window {
            position: absolute;
            left: -12%; /* Moved further left from -8% */
            top: 7%; /* Moved up from 10% */
            z-index: 2;
            width: 700px;
            height: auto;
        }
        
        /* Interactive elements */
        .interactive {
            position: absolute;
            z-index: 2;
            cursor: url('assets/arrow.png') 0 0, pointer;
        }
        .interactive {
            transition: transform 0.2s ease;
        }
        .interactive:hover {
            transform: scale(1.1) translateY(-5px); /* Added translateY to create "raise up" effect */
        }
        
        /* Book link */
        .book-link {
            position: absolute;
            left: 39%;  /* Adjusted to align with book in image */
            top: 77%;   /* Adjusted to align with book in image */
            width: 100px;
            height: 50px;
            z-index: 10;
            cursor: pointer;
            display: block;
        }
        .book-link {
            transition: transform 0.2s ease;
        }
        .book-link:hover {
            transform: scale(1.1) translateY(-5px); /* Added translateY to create "raise up" effect */
        }
        
        /* Photo link */
        .photo-link {
            position: absolute;
            left: 59%;  /* Adjusted to match the photo frame position in your screenshot */
            top: 28%;   /* Adjusted to match the photo frame position in your screenshot */
            width: 130px;
            height: 100px;
            z-index: 10;
            cursor: pointer;
            display: block;
        }
        .photo-link {
            transition: transform 0.2s ease;
        }
        .photo-link:hover {
            transform: scale(1.1) translateY(-5px); /* Added translateY to create "raise up" effect */
        }
        
        .doodle-bubble {
            display: none; /* Removed yellow text boxes */
        }
    </style>
</head>
<body>
    <div class="bg-container">
        <img src="assets/main.png" alt="Main Background">
        <!-- Logo in the top right corner - moved even more upward and made even larger -->
        <div style="position:absolute; right:5%; top:-2%; z-index:20;">
            <img src="assets/logo.png" alt="Logo" style="width:250px; height:auto;">
        </div>
        <!-- Window on left side -->
        <img src="assets/window.png" alt="Window" class="overlay-window">
        <!-- Overlay PC image - only the image is clickable (slightly smaller) -->
        <div style="position:absolute; left:44%; top:62%; transform:translate(-50%,-50%); z-index:10;">
            <a href="index.html" id="pc-link" class="clickable" style="display:inline-block; width:auto; height:auto; cursor:pointer;">
                <img src="assets/pc.png" alt="PC" class="overlay-pc" style="width:210px; height:auto;">
            </a>
        </div>
        
        <!-- Author image below the PC - only the image is clickable -->
        <div style="position:absolute; left:37%; top:82%; transform:translate(-50%,-50%); z-index:9;">
            <a href="author.html" id="author-link" class="clickable" style="display:inline-block; width:auto; height:auto; cursor:pointer;">
                <img src="assets/author.png" alt="Author" class="overlay-author" style="width:120px; height:auto; opacity:0.95;">
            </a>
        </div>

       

       
        
        <!-- Team image integrated with the background wall - only the image is clickable -->
        <div style="position:absolute; left:59%; top:28%; transform:translate(-50%,-50%); z-index:5;">
            <a href="team.html" id="team-link" class="clickable" style="display:inline-block; width:auto; height:auto; cursor:pointer; mix-blend-mode: multiply;">
                <img src="assets/team.png" alt="Team" class="overlay-team" style="width:130px; height:auto; filter: brightness(0.97) contrast(0.95); box-shadow: none;">
            </a>
        </div>
        
        <!-- Plants image on the right side of window - non-clickable decoration -->
        <div style="position:absolute; right:50%; top:30%; transform:translate(0,-50%); z-index:6;">
            <div id="plants-container" style="display:inline-block; width:auto; height:auto;">
                <img id="plants-img" src="assets/plants.png" alt="Plants" style="width:220px; height:auto;">
            </div>
        </div>
        
        <!-- Capybara image on the far right side - non-clickable decoration -->
        <div style="position:absolute; right:0%; top:85%; transform:translate(0,-50%); z-index:7;">
            <div id="capybara-container" style="display:inline-block; width:auto; height:auto;">
                <img id="capybara-img" src="assets/capybara.png" alt="Capybara" style="width:400px; height:auto;">
            </div>
        </div>
        
        <!-- Doodle bubbles (now hidden) -->
        <div class="doodle-bubble" id="book-bubble">Doodle: What's inside this book?</div>
        <div class="doodle-bubble" id="photo-bubble">Doodle: Who are these people?</div>
    </div>
    <div class="container">
        <!--<h1>Welcome to Girlsin</h1>-->
        <!-- Your content goes here -->
    </div>
    <script>
        // Add this script to verify the elements are there and set up event listeners
        document.addEventListener('DOMContentLoaded', function() {
            console.log("Page loaded - setting up click handlers");
            
            // Direct click handlers for each element
            const pcLink = document.getElementById('pc-link');
            if (pcLink) {
                console.log("PC link found");
                pcLink.addEventListener('click', function(e) {
                    console.log("PC clicked");
                    window.location.href = 'index.html';
                });
            }
            
            const bookLink = document.getElementById('book-link');
           
            
            const photoLink = document.getElementById('photo-area');
            if (photoLink) {
                console.log("Photo link found");
                photoLink.addEventListener('click', function(e) {
                    console.log("Photo clicked");
                    window.location.href = 'photo.html';
                });
            }
            
            // Plants image click handler - removed
            
            // Capybara is now non-clickable (removed click handler)
            
            // Add global click effect for all clickable elements
            document.addEventListener('mousedown', function() {
                document.documentElement.classList.add('cursor-clicking');
            });
            
            document.addEventListener('mouseup', function() {
                document.documentElement.classList.remove('cursor-clicking');
            });
        });

        // Doodle bubble logic (robust positioning)
        function showBubble(bubbleId, areaId) {
            const bubble = document.getElementById(bubbleId);
            const area = document.getElementById(areaId);
            if (!bubble || !area) return; // Skip if elements don't exist
            
            area.addEventListener('mouseenter', function(e) {
                bubble.style.opacity = 1;
                bubble.style.left = (e.clientX + 20) + 'px';
                bubble.style.top = (e.clientY - 10) + 'px';
            });
            area.addEventListener('mousemove', function(e) {
                bubble.style.left = (e.clientX + 20) + 'px';
                bubble.style.top = (e.clientY - 10) + 'px';
            });
            area.addEventListener('mouseleave', function() {
                bubble.style.opacity = 0;
            });
        }
        showBubble('book-bubble', 'book-link');
        showBubble('photo-bubble', 'photo-area');

        // Dynamically set body background to match main image edge color
        (function() {
            const img = document.querySelector('.bg-container img');
            if(!img) return;
            if(img.complete) sample(); else img.addEventListener('load', sample);

            function sample() {
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const w = canvas.width = Math.min(120, img.naturalWidth);
                    const h = canvas.height = Math.min(120, img.naturalHeight);
                    ctx.drawImage(img, 0, 0, w, h);
                    const edgePixels = [];
                    const imgData = ctx.getImageData(0,0,w,h).data;
                    function pushPixel(idx){
                        const r = imgData[idx], g = imgData[idx+1], b = imgData[idx+2], a = imgData[idx+3];
                        if(a > 200) edgePixels.push([r,g,b]);
                    }
                    // sample top & bottom rows and left/right cols sparsely
                    for(let x=0; x<w; x+=4){
                        pushPixel((0*w + x)*4);
                        pushPixel(((h-1)*w + x)*4);
                    }
                    for(let y=0; y<h; y+=4){
                        pushPixel((y*w + 0)*4);
                        pushPixel((y*w + (w-1))*4);
                    }
                    if(edgePixels.length){
                        let r=0,g=0,b=0; edgePixels.forEach(p=>{r+=p[0];g+=p[1];b+=p[2];});
                        r=Math.round(r/edgePixels.length); g=Math.round(g/edgePixels.length); b=Math.round(b/edgePixels.length);
                        document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
                    }
                } catch(e) {
                    // If anything fails, keep fallback
                }
            }
        })();
    </script>
</body>
</html>
