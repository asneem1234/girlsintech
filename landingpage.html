    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: auto;
            cursor: auto; /* show default cursor */
        }
        
        /* Custom cursor element that follows the mouse */
        #custom-cursor {
            position: fixed;
            top: -100px; /* Position off-screen initially */
            left: -100px; /* Position off-screen initially */
            width: 40px; /* Smaller size than the original image */
            height: 40px;
            background-image: url('assets/arrow.png');
            background-size: contain;
            background-repeat: no-repeat;
            pointer-events: none; /* Makes sure it doesn't interfere with clicking */
            z-index: 9999;
            transform: translate(-10px, -10px); /* Offset to position the pointer correctly */
            transition: background-image 0.1s ease;
            opacity: 0; /* Start invisible */
        }
        
        /* Change cursor when hovering over clickable elements */
        #custom-cursor.hovering {
            background-image: url('assets/clickable.png');
        }
        
        /* While mouse is pressed down we can style it differently if needed */
        #custom-cursor.clicking {
            transform: translate(-10px, -8px) scale(0.95); /* Slight movement when clicking */
        }
        body {
            background-color: #ffe7d8 !important; /* enforce light background */
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        /* Main background sits behind everything */
        .main-bg { 
            position: absolute; 
            inset: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: center center; 
            z-index: 0; 
        }
        .bg-container img:not(.main-bg) {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            z-index:1;
        }
        
        /* Responsive adjustments to keep clickable areas aligned */
        @media screen and (max-width: 1200px) {
            .photo-link {
                left: 79%;
                top: 31%;
            }
        }
        
        @media screen and (max-width: 768px) {
            .photo-link {
                left: 78%;
                top: 32%;
            }
            
            .book-link {
                left: 47%;
                top: 76%;
            }
        }
        .container {
            padding: 20px;
            z-index: 1;
        }
    </style>

    <script>
        // Preload cursor images & report if missing
        (function(){
            const imgs = ['assets/cursor.png','assets/onclick.png','assets/window.png','assets/window.gif','assets/authors.png','assets/meetteam.png','assets/articlesbub.png','assets/logo.gif','assets/Cat-Sleeping-Loop-Video-Creati-unscreen.gif'];

        })();
        // Add this script to verify the elements are there and set up event listeners
        document.addEventListener('DOMContentLoaded', function() {
            console.log("Page loaded - setting up click handlers");
            
            // Direct click handlers for each element
            const pcLink = document.getElementById('pc-link');
            if (pcLink) {
                console.log("PC link found");
                // Removed default navigation click handler - using GSAP animation instead
            }

            // Lamp click -> change background color to dark purple (toggle)
            const lamp = document.getElementById('lamp');
            if (lamp) {
                lamp.addEventListener('click', function(e){
                    e.preventDefault();
                    const dark = document.body.classList.toggle('dark-purple-bg');
                });
            }

            // Window animation on hover - direct swap like author/team
            (function(){
                const winImg = document.getElementById('room-window');
                if(!winImg) return;
                
                // Original size and position values
                const original = {
                    width: '850px',
                    height: 'auto',
                    left: '-20%'
                };
                
                // Larger size and shifted position for GIF
                const changed = {
                    width: '1100px', // Increased from 1000px
                    height: 'auto',
                    left: '-30%' // Moved even further to the left (from -25%)
                };
                
                // Preload the GIF for performance
                const windowGif = new Image();
                windowGif.src = 'assets/window.gif';
                
                // Direct image swap on hover with size and position changes (no transition)
                winImg.addEventListener('mouseenter', function() {
                    winImg.src = 'assets/window.gif';
                    winImg.style.width = changed.width;
                    winImg.style.left = changed.left; // Move left
                });
                
                winImg.addEventListener('mouseleave', function() {
                    winImg.src = 'assets/window.png';
                    winImg.style.width = original.width;
                    winImg.style.left = original.left; // Reset position
                });
            })();
            
            const bookLink = document.getElementById('book-link');
           
            
            const photoLink = document.getElementById('photo-area');
            if (photoLink) {
                console.log("Photo link found");
                photoLink.addEventListener('click', function(e) {
                    console.log("Photo clicked");
                    window.location.href = 'photo.html';
                });
            }
            
            // Add global click effect for all clickable elements
            document.addEventListener('mousedown', function() {
                document.documentElement.classList.add('cursor-clicking');
            });
            
            document.addEventListener('mouseup', function() {
                document.documentElement.classList.remove('cursor-clicking');
            });
            // Also remove on mouseleave (e.g., if mouse released outside window)
            document.addEventListener('mouseleave', function() {
                document.documentElement.classList.remove('cursor-clicking');
            });
            
            // Author image hover effect - switch to GIF on hover (play once)
            const authorLink = document.getElementById('author-link');
            const authorImage = document.getElementById('author-image');
            if (authorLink && authorImage) {
                // Preload the GIF to get its duration
                const authorGif = new Image();
                authorGif.src = 'assets/author.gif';
                
                let gifTimeout;
                
                authorLink.addEventListener('mouseenter', function() {
                    // Clear any existing timeout
                    if (gifTimeout) {
                        clearTimeout(gifTimeout);
                    }
                    
                    // Set src to GIF to start animation
                    authorImage.src = 'assets/author.gif';
                    
                    // Estimate GIF duration - we'll use 3 seconds as default
                    // You may need to adjust this value based on actual GIF length
                    const estimatedDuration = 1000; // 3 seconds
                    
                    // Set a timer to switch back to PNG after the animation plays once
                    gifTimeout = setTimeout(function() {
                        authorImage.src = 'assets/author.png';
                    }, estimatedDuration);
                });
                
                authorLink.addEventListener('mouseleave', function() {
                    // If mouse leaves before animation completes, switch back to PNG
                    authorImage.src = 'assets/author.png';
                    
                    // Clear the timeout
                    if (gifTimeout) {
                        clearTimeout(gifTimeout);
                    }
                });

        });

        // Doodle bubble logic (robust positioning)
        function showBubble(bubbleId, areaId) {

    // Removed dynamic sampling so manual light/dark colors show clearly.

    document.addEventListener('DOMContentLoaded', function() {

        if (teamImage) {
            const staticSrc = 'assets/team.png';

            };

                teamLink.style.height = largerStyle.height;
                
                // Center the enlarged image, move it more to the right and lower

                // Change back to static PNG

                // Restore original size
                teamImage.style.width = originalStyle.width;
                teamImage.style.height = originalStyle.height;
                
                // Restore parent container size
                teamLink.style.width = originalStyle.width;
                teamLink.style.height = originalStyle.height;
                
                // Reset positioning
                teamLink.style.transform = '';
            });
        }
    });

    // Custom cursor implementation
    // Define custom cursor as a global variable so it can be accessed by animation code
    let customCursor;
    
    document.addEventListener('DOMContentLoaded', function() {
        // Create the cursor element
        customCursor = document.createElement('div');
        customCursor.id = 'custom-cursor';
        document.body.appendChild(customCursor);
        
        // Move the cursor with mouse
        let firstMove = true;
        document.addEventListener('mousemove', function(e) {
            if (firstMove) {
                // Show the cursor on first mouse movement
                customCursor.style.opacity = '1';
                firstMove = false;
            }
            customCursor.style.left = e.clientX + 'px';
            customCursor.style.top = e.clientY + 'px';
        });
        
        // Add clicking state
        document.addEventListener('mousedown', function() {
            customCursor.classList.add('clicking');
        });
        
        document.addEventListener('mouseup', function() {
            customCursor.classList.remove('clicking');
        });
        
        // Handle cursor leaving the window
        document.addEventListener('mouseleave', function() {
            customCursor.style.display = 'none';
        });
        
        document.addEventListener('mouseenter', function() {
            customCursor.style.display = 'block';
        });
        
        // Change cursor for clickable elements
        const clickableElements = document.querySelectorAll('a, button, .clickable, .clickable-no-hover, #lamp, #team-link, #pc-link, #author-link');
        
        // Get the audio element for click sound
        const clickSound = document.getElementById('click-sound');
        
        // Function to play click sound
        function playClickSound() {
            if (clickSound) {
                try {
                    clickSound.currentTime = 0;
                    const playPromise = clickSound.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(function(error) {
                            console.log('Audio playback error:', error);
                            if (error.name === 'NotAllowedError') {
                                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                                const source = audioContext.createBufferSource();
                                const clickBuffer = audioContext.createBuffer(1, 1024, 22050);
                                const clickData = clickBuffer.getChannelData(0);
                                for (let i = 0; i < clickData.length; i++) {
                                    clickData[i] = Math.random() * 2 - 1;
                                }
                                source.buffer = clickBuffer;
                                source.connect(audioContext.destination);
                                source.start(0);
                            }
                        });
                    }
                } catch (e) {
                    console.log('Audio play error:', e);
                }
            }
        }
        
        // Add specific listeners for the main interactive elements
        const pcLink = document.getElementById('pc-link');
        const authorLink = document.getElementById('author-link');
        const teamLink = document.getElementById('team-link');
        const lampElement = document.getElementById('lamp');
        
        // PC click handler to navigate to article.html
        if (pcLink) {
            pcLink.addEventListener('click', function(e) {
                e.preventDefault();
                playClickSound();
                console.log("PC clicked - navigating to blog.html");
                
                // Add a small delay to allow the click sound to play
                setTimeout(function() {
                    window.location.href = 'blog.html';
                }, 50);
            });
            
            // PC hover effect - switch to GIF on hover with increased size and show bubble
            const pcImage = document.getElementById('pc-image');
            const pcWrapper = document.querySelector('.pc-wrapper');
            const pcBubble = document.querySelector('.pc-bubble');
            
            if (pcImage) {
                // Static image dimensions - even smaller size
                const staticWidth = '250px';
                const staticHeight = '195px';
                
                // Paths to images
                const staticSrc = 'assets/pc.png';
                const animatedSrc = 'assets/pc.gif';
                
                // GIF size - larger than static
                const gifWidth = '350px';
                const gifHeight = '275px';
                
                // Preload the GIF for smoother transition
                const preloadGif = new Image();
                preloadGif.src = animatedSrc;
                
                // When mouse enters the PC image
                pcLink.addEventListener('mouseenter', function() {
                    // Change to GIF with larger dimensions
                    pcImage.src = animatedSrc;
                    pcImage.style.width = gifWidth;
                    pcImage.style.height = gifHeight;
                    pcImage.style.objectFit = 'contain';
                    
                    // Make a very subtle adjustment upward with same left position
                    pcImage.style.transform = 'translateY(-40px) translateX(-45px)';
                    
                    // Show the articles bubble
                    if (pcBubble) {
                        pcBubble.style.opacity = '1';
                        pcBubble.style.transform = 'translateY(0) scale(1)';
                    }
                });
                
                // When mouse leaves
                pcLink.addEventListener('mouseleave', function() {
                    // Change back to static PNG with smaller dimensions
                    pcImage.src = staticSrc;
                    pcImage.style.width = staticWidth;
                    pcImage.style.height = staticHeight;
                    pcImage.style.objectFit = 'contain';
                    
                    // Reset position adjustment - ensuring no vertical shift
                    pcImage.style.transform = 'translateY(0)';
                    
                    // Hide the articles bubble
                    if (pcBubble) {
                        pcBubble.style.opacity = '0';
                        pcBubble.style.transform = 'translateY(6px) scale(.95)';
                    }
                });
            }
        }
        
        // Logo hover effect - switch to GIF on hover with increased size
        const logoLink = document.getElementById('logo-link');
        const logoImage = document.getElementById('logo-image');
        if (logoLink && logoImage) {
            // Image paths
            const staticLogoSrc = 'assets/logo.png';
            const animatedLogoSrc = 'assets/logo.gif';
            
            // Save original dimensions
            const originalWidth = logoImage.offsetWidth || 250; // Default from CSS if not rendered yet
            const originalRight = 20; // Default right position from CSS
            // Increased size for GIF (30% larger)
            const gifWidth = originalWidth * 1.25;

            // Preload the GIF for smoother transition
            const preloadLogoGif = new Image();
            preloadLogoGif.src = animatedLogoSrc;
            
            // When mouse enters the logo
            logoLink.addEventListener('mouseenter', function() {
                // Store original width if not saved yet
                if (!logoImage.originalWidth) {
                    logoImage.originalWidth = logoImage.offsetWidth;
                    logoImage.originalHeight = logoImage.offsetHeight;
                }
                
                // Change to GIF with increased size
                logoImage.src = animatedLogoSrc;
                logoImage.style.width = gifWidth + 'px';
                
                // Adjust the position to keep it aligned on the right edge
                logoLink.style.right = (originalRight - (gifWidth - originalWidth) / 2) + 'px';
            });
            
            // When mouse leaves
            logoLink.addEventListener('mouseleave', function() {
                // Change back to static PNG with original size
                logoImage.src = staticLogoSrc;
                logoImage.style.width = originalWidth + 'px';
                
                // Reset position
                logoLink.style.right = originalRight + 'px';
            });
        }
        
        // Author link - show password modal
        if (authorLink) {
            authorLink.addEventListener('click', function(e) {
                e.preventDefault();
                console.log("Author link clicked - showing password modal");
                playClickSound();
                const passwordModal = document.getElementById('password-modal');
                const passwordInput = document.getElementById('password-input');
                if (passwordModal && passwordInput) {
                    passwordModal.style.display = 'flex';
                    passwordInput.focus();
                    console.log("Password modal shown and input focused");
                } else {
                    console.error("Password modal elements not found!");
                }
            });
        }
        
        if (teamLink) teamLink.addEventListener('click', playClickSound);
        if (lampElement) lampElement.addEventListener('click', playClickSound);
        
        // Add general listeners for all clickable elements
        clickableElements.forEach(function(element) {
            element.addEventListener('mouseenter', function() {
                customCursor.classList.add('hovering');
            });

            element.addEventListener('mouseleave', function() {
                customCursor.classList.remove('hovering');
            });

            // Add click sound when element is clicked
            element.addEventListener('click', playClickSound);
        });
        
        // Password Modal Logic
        const CORRECT_PASSWORD = "HEHE123";
        const passwordModal = document.getElementById('password-modal');
        const passwordInput = document.getElementById('password-input');
        const submitBtn = document.getElementById('submit-password');
        const cancelBtn = document.getElementById('cancel-password');
        const errorMsg = document.getElementById('error-message');

        function checkPassword() {
            const enteredPassword = passwordInput.value.trim();
            if (enteredPassword === CORRECT_PASSWORD) {
                passwordModal.style.display = 'none';
                playClickSound();
                window.location.href = 'author.html';
            } else {
                errorMsg.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
                playClickSound();
            }
        }

        if (submitBtn) {
            submitBtn.addEventListener('click', function(e) {
                e.preventDefault();
                checkPassword();
            });
        }
        
        if (passwordInput) {
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    checkPassword();
                }
            });
        }

        if (cancelBtn) {
            cancelBtn.addEventListener('click', function() {
                passwordModal.style.display = 'none';
                playClickSound();
            });
        }
        
        // Add hover effects to password modal buttons
        [submitBtn, cancelBtn].forEach(btn => {
            if (btn) {
                btn.addEventListener('mouseenter', function() {
                    customCursor.classList.add('hovering');
                });
                btn.addEventListener('mouseleave', function() {
                    customCursor.classList.remove('hovering');
                });
                btn.addEventListener('click', playClickSound);
            }
        });
    });
    </script>
    
    <!-- Audio element for click sound (preloaded but hidden) -->
    <audio id="click-sound" preload="auto" style="display: none;">
        <source src="assets/click.mp3" type="audio/mp3">
    </audio>
</body>
</html>
