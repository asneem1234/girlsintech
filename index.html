<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloogle</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5e8d4;
            font-family: Arial, sans-serif;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .bloogle-frame {
            background-color: #f5e8d4;
            border-radius: 15px;
            padding: 40px 20px;
            box-shadow: 0 0 0 10px #6d5d54;
            position: relative;
            text-align: center;
            border: 5px solid #3a322e;
        }

        .bloogle-title {
            font-size: 60px;
            color: #3a322e;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background-color: #f5e8d4;
            border-radius: 50px;
            border: 2px solid #3a322e;
            overflow: hidden;
            width: 100%;
            height: 50px;
            margin: 0 auto;
        }

        .search-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 50px;
            height: 100%;
            border-right: 2px solid #3a322e;
        }

        .search-icon svg {
            width: 24px;
            height: 24px;
            fill: #3a322e;
        }

        .search-input {
            flex: 1;
            border: none;
            background: #f5e8d4;
            height: 100%;
            padding: 0 10px;
            font-size: 18px;
            color: #3a322e;
        }

        .search-input:focus {
            outline: none;
        }

        .arrow-down {
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 15px solid #3a322e;
            margin: 15px auto 0;
        }

        .bottom-frame {
            height: 30px;
            background-color: #f5e8d4;
            border-left: 5px solid #6d5d54;
            border-right: 5px solid #6d5d54;
            border-bottom: 5px solid #6d5d54;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            position: relative;
            top: -5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bloogle-frame">
            <div class="bloogle-title">Bloogle</div>
            <div class="search-box">
                <div class="search-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </div>
                <input type="text" class="search-input" autofocus>
            </div>
        </div>
        <div class="bottom-frame">
            <div class="arrow-down"></div>
        </div>
    </div>
</body>
</html>
