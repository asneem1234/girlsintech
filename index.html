<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Girlsin</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: auto;
        }
        body {
            background-color: #fee5d9;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: url('assets/cursor.png') 8 8, url('assets/cursor.jpeg') 8 8, auto;
        }
        html.cursor-clicking body, body.cursor-clicking {
            cursor: url('assets/onclick.png') 8 8, url('assets/cursor.png') 8 8, pointer;
        }
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #fee5d9;
        }
        .bg-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .container {
            padding: 20px;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="bg-container">
        <img src="assets/main.png" alt="Main Background">
    </div>
    <div class="container">
        <h1>Welcome to Girlsin</h1>
        <!-- Your content goes here -->
    </div>
    <script>
        (function(){
            const imgs=['assets/cursor.png','assets/onclick.png'];
            imgs.forEach(src=>{const i=new Image(); i.onload=()=>console.log('Loaded cursor asset',src); i.onerror=()=>console.warn('Missing cursor asset',src); i.src=src;});
            document.addEventListener('mousedown',()=>document.documentElement.classList.add('cursor-clicking'));
            document.addEventListener('mouseup',()=>document.documentElement.classList.remove('cursor-clicking'));
            document.addEventListener('mouseleave',()=>document.documentElement.classList.remove('cursor-clicking'));
        })();
    </script>
</body>
</html>
